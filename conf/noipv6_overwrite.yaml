# 机场订阅
proxy-providers:
  WD:
    url: "url"
    type: http
    proxy: Mainland
  NB:
    url: "url"
    type: http
    proxy: Mainland
    filter: "^((?!(更新|客户端|显示|教程)).)*$"
  WM:
    url: "url"
    type: http
    proxy: Mainland
    filter: "^((?!(测试|客户端|官网|教程)).)*$"
  XZY:
    url: "url"
    type: http
    proxy: Mainland
    filter: "^((?!(测试|客户端|官网|教程|更新|TG群|重置|ISP)).)*$"
  mitee:
    url: "url"
    type: http
    proxy: Mainland
    filter: "^((?!(测试|客户端|官网|教程|更新|TG群|重置|ISP)).)*$"
    
# 基本代理
# 用于订阅和拒绝连接
proxies:
  - { name: Mainland, type: direct, udp: true }
  - { name: Reject, type: reject, udp: true }

# 端口及全局设置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
mode: rule
allow-lan: true
ipv6: false
log-level: warning
external-controller: 0.0.0.0:9090
bind-address: "*"
find-process-mode: "off" #性能开销大 mt3000不适合开
keep-alive-interval: 15
keep-alive-idle: 600
client-fingerprint: chrome

# 配置存储
profile:
  store-selected: true
  store-fake-ip: true
  
# geo 链接
# 采用 https://github.com/MetaCubeX/meta-rules-dat/tree/master 项目中的文件
geox-url:
  mmdb: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  geoip: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  asn: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb

# 实验性功能
experimental:
  quic-go-disable-gso: true 

# TUN 模式配置
tun:
  enable: false
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  
# 嗅探链接
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.v2ex.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"
  parse-pure-ip: true

# DNS 设置
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:7874
  ipv6: false
  respect-rules: true
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - geosite:cn
    - "rule-set:fakeipfilter_domain,direct_list"

# 策略组
# 策略组定义锚
group1: &group1
  type: select
  proxies:
    - Mainland
    - NB-manual
    - XZY-manual
    - mitee-manual
    - WD-manual
    - WM-manual
    - HK-manual
    - TW-manual
    - JP-manual
    - KR-manual
    - SG-manual
    - US-manual
    - Reject

# 应用策略层 - Select手动选择，支持多场景应用优化
proxy-groups:
  - { name: Proxy, <<: *group1 }
  - { name: GlobalDirect, <<: *group1 }
  - { name: Hentai, <<: *group1 }
  - { name: HentaiRestrict, <<: *group1 }
  - { name: HentaiRegion, <<: *group1 }
  - { name: StreamMedia, <<: *group1 }
  - { name: SocialMedia, <<: *group1 }
  - { name: Scholar, <<: *group1 }
  - { name: AI, <<: *group1 }
  - { name: Google, <<: *group1 }
  - { name: Microsoft, <<: *group1 }
  - { name: Github, <<: *group1 }
  - { name: Pikpak, <<: *group1 }
  - { name: Apple, <<: *group1 }
  - { name: Block, <<: *group1 }
  - { name: Match, <<: *group1 }

  # 机场组-手动
  - name: NB-manual
    type: select
    use:
      - NB
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    filter: "^((?!(流量|官网|超时|xianzheyun|ISP|重置|到期)).)*$"

  - name: XZY-manual
    type: select
    use:
      - XZY
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    filter: "^((?!(官网|客户端|流量|重置|到期)).)*$"
    
  - name: mitee-manual
    type: select
    use:
      - mitee
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    filter: "^((?!(官网|客户端|流量|重置|到期)).)*$"
    
  - name: WD-manual
    type: select
    use:
      - WD
    url: "https://www.gstatic.com/generate_204"
    interval: 3600
    filter: "^((?!(Traffic|Expire)).)*$"
    
  - name: WM-manual
    type: select
    use:
      - WM
    url: "https://www.gstatic.com/generate_204"
    interval: 1800
    filter: "^((?!(官网|客户端)).)*$"

# 地理策略层-手动
  - name: HK-manual
    type: select
    include-all: true
    filter: "(?i)港|香港|🇭🇰|HK|Hong Kong|hongkong"

  - name: TW-manual
    type: select
    include-all: true
    filter: "(?i)台|台湾|新北|彰化|TW|Taiwan|taiwan"

  - name: JP-manual
    type: select
    include-all: true
    filter: "(?i)日|日本|🇯🇵|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan"

  - name: KR-manual
    type: select
    include-all: true
    filter: "(?i)韩|韩国|KR|Korea"
    
  - name: SG-manual
    type: select
    include-all: true
    filter: "(?i)新加坡|🇸🇬|坡|狮城|SG|Singapore"

  - name: US-manual
    type: select
    include-all: true
    filter: "((?i)美|美国|波特兰|纽约|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|United States|US|us)"

# 规则匹配
# 把小的，需要优先匹配的规则放在前面，大的兜底的规则放在后面
# 优先使用 geosite，geoip的规则
# geosite，geoip 的名字可以参考 https://github.com/MetaCubeX/meta-rules-dat/tree/meta 项目
# 上述项目的规则也可以通过 ruleset 的方式引入
rules:
  # 拦截规则
  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT  # 阻止 QUIC
  # 自定义维护规则
  - RULE-SET,dns_list,GlobalDirect
  - RULE-SET,direct_list,GlobalDirect
  - RULE-SET,direct_ip,GlobalDirect,no-resolve
  - RULE-SET,hk_list,HK-manual
  - RULE-SET,tw_list,TW-manual
  - RULE-SET,sg_list,SG-manual
  - RULE-SET,jp_list,JP-manual
  - RULE-SET,kr_list,KR-manual
  - RULE-SET,us_list,US-manual
  - RULE-SET,pikpak_list,Pikpak
  - RULE-SET,pikpak_ip,Pikpak,no-resolve
  - RULE-SET,hentai_list,Hentai
  - RULE-SET,hentairestrict_list,HentaiRestrict
  - RULE-SET,hentairegion_list,HentaiRegion
  - RULE-SET,scholar_list,Scholar
  - RULE-SET,service_list,Github
  - RULE-SET,social_list,SocialMedia
  - RULE-SET,media_list,StreamMedia
  - RULE-SET,proxy_list,Proxy
  # 数据库规则 具体常用需提前匹配
  - GEOSITE,pikpak,Pikpak
  - GEOSITE,dmm,JP-manual
  - GEOSITE,ehentai,HentaiRestrict
  - GEOSITE,javdb,HentaiRestrict
  - GEOSITE,youjizz,Hentai
  - GEOSITE,pixiv,Proxy
  - GEOSITE,dlsite,JP-manual
  - GEOSITE,xvideos,HentaiRegion
  - GEOSITE,spankbang,HentaiRegion
  - GEOSITE,xhamster,HentaiRegion
  - GEOSITE,x,SocialMedia
  - GEOIP,twitter,SocialMedia,no-resolve
  - GEOSITE,telegram,SocialMedia
  - GEOIP,telegram,SocialMedia,no-resolve
  - GEOSITE,youtube,StreamMedia
  - GEOSITE,apple,Apple
  - GEOSITE,github,Github
  - GEOSITE,onedrive,Microsoft
  - GEOSITE,microsoft,Microsoft
  - GEOIP,google,Google,no-resolve
  - GEOSITE,google,Google
  # 数据库规则 兜底
  - GEOSITE,category-ai-!cn,AI
  - GEOSITE,category-social-media-!cn,SocialMedia
  - GEOSITE,category-scholar-!cn,Scholar
  - GEOSITE,category-porn,Hentai
  - GEOSITE,gfw,Proxy
  - GEOSITE,geolocation-!cn,Proxy
  - GEOSITE,private,GlobalDirect
  - GEOSITE,cn,GlobalDirect
  - GEOIP,cn,GlobalDirect,no-resolve
  - RULE-SET,block_domain,Block
  # 最终兜底
  - MATCH,Match

# 规则集
rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
  class: &class { type: http, interval: 86400, behavior: classical, format: text }

rule-providers:
